    # Optional: if data_load_times lives elsewhere (Stripe SDP default: same schema as reports)
    # data_load_times_schema: "stripe"
    # buyrates report: itemized_fees column for WHERE date range (default activity_at)
    # buyrates_date_column: "incurred_at"   # override if your table differs
    no_ssl_verify: true  # VPN/proxy hostname doesn't match Redshift cert
    # user and password from env: PIPELINE_USER, PIPELINE_PASSWORD (or .secrets [pipeline] user, password)
    #
    # Optional: target buyrate per product_feature_description (must match Stripe). Keys quoted.
    # Per currency: nested map (usd/gbp/...) — row uses the key matching itemized_fees.currency (case-insensitive).
