    # Hide a fee from the buyrates table: use an object with display: false (optional usd/gbp ignored for output).
    # group: "Section name" (optional) — buyrates table inserts a full-row header, then fees sharing that name. Omit group → section **Core**. Groups are ordered **alphabetically** (A–Z).
